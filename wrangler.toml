#:schema node_modules/wrangler/config-schema.json

name = "manamurah-mcp-server"
main = "src/index.ts"
compatibility_date = "2025-04-22"
compatibility_flags = ["nodejs_compat"]

# Upstream proxy base URL. This Worker holds no credentials — every
# request is forwarded to manamurah.com/api/v2/mcp/* which is
# already public + edge-cached.
[vars]
MANAMURAH_API_BASE = "https://manamurah.com"

# Custom domain binding — mcp.manamurah.com → this Worker.
[[routes]]
pattern = "mcp.manamurah.com"
custom_domain = true

# Environment variants (inherit [vars] unless overridden).
[env.staging]
name = "manamurah-mcp-server-staging"

[env.development]
name = "manamurah-mcp-server-dev"
